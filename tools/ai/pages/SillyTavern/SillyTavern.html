<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍷 SillyTavern 免费公益酒馆合集</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --bg2: #111118;
            --card-bg: rgba(20, 20, 35, 0.7);
            --card-border: rgba(100, 140, 255, 0.12);
            --card-hover-border: rgba(100, 160, 255, 0.45);
            --text: #d0d8f0;
            --text-secondary: #8899bb;
            --accent: #6490ff;
            --accent-glow: #8ab4ff;
            --tag-bg: rgba(100, 140, 255, 0.12);
            --tag-text: #9ab8ff;
            --heart: #6b7db3;
            --heart-active: #ff5577;
            --toast-bg: rgba(10, 10, 20, 0.95);
            --modal-bg: rgba(12, 12, 22, 0.97);
            --modal-overlay: rgba(0, 0, 0, 0.75);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 8px 50px rgba(0, 0, 0, 0.7);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            --neon-glow: 0 0 20px rgba(100, 140, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(80, 120, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(120, 60, 200, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(40, 60, 120, 0.03) 0%, transparent 80%);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            letter-spacing: 0.02em;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(100, 140, 255, 0.008) 3px, rgba(100, 140, 255, 0.008) 6px);
            opacity: 0.4;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 24px 60px;
        }

        /* 头部 */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            position: relative;
        }
        .header-icon {
            font-size: 60px;
            display: block;
            margin-bottom: 4px;
            animation: float 3.5s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(100, 160, 255, 0.5));
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-12px);
            }
        }
        .header h1 {
            font-size: clamp(1.7rem, 3.5vw, 2.4rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, #aaccff 0%, #6088ff 50%, #4a6fdf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            text-shadow: none;
        }
        .header .subtitle {
            font-size: 0.88rem;
            color: #7799cc;
            letter-spacing: 0.08em;
            opacity: 0.8;
            font-weight: 400;
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin: 18px 0 30px;
            padding: 0 10px;
        }
        .search-wrap {
            position: relative;
            flex: 1 1 260px;
            max-width: 420px;
            min-width: 200px;
        }
        .search-wrap input {
            width: 100%;
            padding: 13px 20px 13px 46px;
            border-radius: 50px;
            border: 1.5px solid var(--card-border);
            background: rgba(18, 18, 30, 0.7);
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            letter-spacing: 0.03em;
        }
        .search-wrap input::placeholder {
            color: rgba(150, 170, 210, 0.4);
        }
        .search-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(100, 140, 255, 0.1), var(--neon-glow);
            background: rgba(22, 22, 38, 0.8);
        }
        .search-wrap .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            pointer-events: none;
            opacity: 0.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            border-radius: 50px;
            border: 1.5px solid var(--card-border);
            background: rgba(20, 20, 35, 0.6);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            transition: var(--transition);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            white-space: nowrap;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: inherit;
            font-weight: 500;
        }
        .btn:hover {
            border-color: var(--accent);
            background: rgba(30, 30, 50, 0.75);
            box-shadow: 0 0 24px rgba(100, 140, 255, 0.18);
            transform: translateY(-1px);
            color: #e0e8ff;
        }
        .btn:active {
            transform: scale(0.96);
            transition: 0.1s;
        }
        .btn-refresh {
            border-color: rgba(100, 150, 255, 0.3);
            background: rgba(100, 140, 255, 0.07);
        }
        .btn-refresh:hover {
            border-color: var(--accent);
            background: rgba(100, 140, 255, 0.15);
            box-shadow: 0 0 30px rgba(100, 150, 255, 0.25);
        }
        .btn-filter.active {
            border-color: var(--accent);
            background: rgba(100, 140, 255, 0.15);
            box-shadow: 0 0 20px rgba(100, 140, 255, 0.2);
        }
        .badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 3px 9px;
            border-radius: 20px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-left: 4px;
            box-shadow: 0 0 12px rgba(100, 140, 255, 0.4);
        }

        /* 统计 */
        .stats {
            text-align: center;
            font-size: 0.8rem;
            color: #6a80aa;
            margin-bottom: 20px;
            letter-spacing: 0.05em;
        }
        .stats span {
            color: #aaccff;
            font-weight: 600;
        }

        /* 卡片网格 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            padding: 0 6px;
        }
        @media (max-width: 600px) {
            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
                gap: 14px;
            }
        }

        /* 卡片 */
        .card {
            position: relative;
            background: var(--card-bg);
            border: 1.5px solid var(--card-border);
            border-radius: var(--radius);
            padding: 24px 18px 18px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            animation: cardIn 0.45s ease-out both;
        }
        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(100, 160, 255, 0.35), transparent);
            opacity: 0;
            transition: var(--transition);
        }
        .card:hover {
            border-color: var(--card-hover-border);
            box-shadow: 0 0 40px rgba(100, 140, 255, 0.15), var(--shadow-lg);
            transform: translateY(-4px);
            background: rgba(25, 25, 42, 0.75);
        }
        .card:hover::before {
            opacity: 1;
            width: 75%;
        }
        .card:active {
            transform: scale(0.975);
            transition: 0.1s;
        }
        .card.highlight {
            border-color: #88aaff !important;
            box-shadow: 0 0 45px rgba(120, 170, 255, 0.45), 0 0 80px rgba(100, 140, 255, 0.3) !important;
            animation: pulseGlow 1.3s ease-in-out 3;
            z-index: 2;
        }
        @keyframes pulseGlow {
            0%,
            100% {
                box-shadow: 0 0 45px rgba(120, 170, 255, 0.45), 0 0 80px rgba(100, 140, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 65px rgba(140, 190, 255, 0.7), 0 0 110px rgba(100, 150, 255, 0.5);
            }
        }
        .card.favorited {
            border-color: rgba(255, 90, 130, 0.3);
        }
        .card.favorited::after {
            content: '❤';
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 1rem;
            opacity: 0.7;
            pointer-events: none;
            color: var(--heart-active);
            filter: drop-shadow(0 0 8px rgba(255, 80, 120, 0.6));
            animation: heartBeat 1.2s ease-in-out infinite;
        }
        @keyframes heartBeat {
            0%,
            100% {
                transform: scale(1);
            }
            15% {
                transform: scale(1.3);
            }
            30% {
                transform: scale(1);
            }
        }

        .card-icon {
            font-size: 2.6rem;
            line-height: 1;
            text-align: center;
            pointer-events: none;
            filter: drop-shadow(0 0 10px rgba(100, 160, 255, 0.3));
        }
        .card-name {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-align: center;
            pointer-events: none;
            color: #dde4ff;
        }
        .card-desc {
            font-size: 0.8rem;
            color: #8899bb;
            text-align: center;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            pointer-events: none;
            line-height: 1.5;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            pointer-events: none;
        }
        .tag {
            display: inline-block;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--tag-bg);
            color: var(--tag-text);
            letter-spacing: 0.05em;
            font-weight: 500;
            border: 1px solid rgba(100, 140, 255, 0.15);
        }
        .card-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            pointer-events: all;
            margin-top: 2px;
        }
        .card-actions .mini-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1.5px solid var(--card-border);
            background: rgba(20, 20, 38, 0.5);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: #8899bb;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .card-actions .mini-btn:hover {
            border-color: var(--accent);
            background: rgba(40, 40, 65, 0.7);
            color: #dde4ff;
            box-shadow: 0 0 16px rgba(100, 140, 255, 0.25);
            transform: scale(1.08);
        }
        .card-actions .mini-btn:active {
            transform: scale(0.88);
            transition: 0.1s;
        }
        .mini-btn.fav-btn.favorited {
            border-color: rgba(255, 90, 130, 0.5);
            background: rgba(255, 70, 100, 0.18);
            color: var(--heart-active);
            box-shadow: 0 0 18px rgba(255, 80, 120, 0.3);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 70px 20px;
            color: #667799;
            grid-column: 1 / -1;
        }
        .empty-state .empty-icon {
            font-size: 3.2rem;
            display: block;
            margin-bottom: 14px;
            opacity: 0.5;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: var(--modal-overlay);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.22s ease-out;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: var(--modal-bg);
            border: 1.5px solid rgba(100, 150, 255, 0.25);
            border-radius: var(--radius);
            padding: 32px 26px 26px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 0 60px rgba(100, 140, 255, 0.2), var(--shadow-lg);
            position: relative;
            animation: modalIn 0.32s cubic-bezier(0.22, 0.61, 0.36, 1);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            text-align: center;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(28px) scale(0.93);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .modal-close {
            position: absolute;
            top: 14px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid rgba(100, 150, 255, 0.25);
            background: rgba(20, 20, 38, 0.6);
            cursor: pointer;
            font-size: 1.1rem;
            color: #8899bb;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
            z-index: 2;
        }
        .modal-close:hover {
            border-color: var(--accent);
            color: #fff;
            background: rgba(40, 40, 65, 0.8);
            box-shadow: 0 0 16px rgba(100, 140, 255, 0.3);
        }
        .modal-icon {
            font-size: 3.8rem;
            display: block;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 16px rgba(100, 160, 255, 0.5));
        }
        .modal-name {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #e0e8ff;
            margin-bottom: 6px;
        }
        .modal-desc {
            font-size: 0.9rem;
            color: #8899bb;
            margin-bottom: 14px;
            line-height: 1.6;
        }
        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .modal .btn-visit {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            border-radius: 50px;
            border: 1.5px solid var(--accent);
            background: rgba(100, 140, 255, 0.15);
            color: #aaccff;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            transition: var(--transition);
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            font-family: inherit;
            box-shadow: 0 0 18px rgba(100, 140, 255, 0.15);
        }
        .modal .btn-visit:hover {
            background: rgba(100, 140, 255, 0.28);
            box-shadow: 0 0 35px rgba(100, 150, 255, 0.4);
            transform: translateY(-3px);
            color: #fff;
        }
        .modal .btn-visit:active {
            transform: scale(0.95);
            transition: 0.1s;
        }
        .modal-actions-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .modal-actions-row .mini-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1.5px solid rgba(100, 150, 255, 0.25);
            background: rgba(20, 20, 38, 0.5);
            cursor: pointer;
            font-size: 1.15rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: #8899bb;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .modal-actions-row .mini-btn:hover {
            border-color: var(--accent);
            color: #fff;
            background: rgba(40, 40, 65, 0.7);
            box-shadow: 0 0 18px rgba(100, 140, 255, 0.3);
        }
        .modal-actions-row .mini-btn.favorited {
            border-color: rgba(255, 90, 130, 0.5);
            background: rgba(255, 70, 100, 0.18);
            color: var(--heart-active);
            box-shadow: 0 0 20px rgba(255, 80, 120, 0.4);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
        }
        .toast {
            background: var(--toast-bg);
            color: #dde4ff;
            padding: 13px 24px;
            border-radius: 50px;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            border: 1px solid rgba(100, 140, 255, 0.3);
            box-shadow: 0 0 30px rgba(100, 140, 255, 0.2);
            animation: toastIn 0.35s ease-out, toastOut 0.3s ease-in 2s forwards;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            white-space: nowrap;
            pointer-events: auto;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 24px 12px 10px;
            }
            .header-icon {
                font-size: 44px;
            }
            .header h1 {
                font-size: 1.35rem;
            }
            .toolbar {
                gap: 10px;
                margin: 12px 0 22px;
            }
            .btn {
                padding: 10px 16px;
                font-size: 0.82rem;
                gap: 5px;
            }
            .search-wrap input {
                padding: 11px 15px 11px 38px;
                font-size: 0.85rem;
            }
            .card {
                padding: 18px 12px 14px;
                border-radius: 13px;
                gap: 8px;
            }
            .card-icon {
                font-size: 2rem;
            }
            .card-name {
                font-size: 0.95rem;
            }
            .card-desc {
                font-size: 0.73rem;
            }
            .card-actions .mini-btn {
                width: 32px;
                height: 32px;
                font-size: 0.85rem;
            }
            .modal {
                padding: 24px 18px 20px;
                border-radius: 13px;
            }
            .modal-icon {
                font-size: 2.8rem;
            }
            .modal-name {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <span class="header-icon">🍷</span>
            <h1>SillyTavern 公益酒馆合集</h1>
            <p class="subtitle">—— AI 角色扮演 · 免费实例共享 ——</p>
        </header>

        <div class="toolbar">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索酒馆名称或标签..." autocomplete="off">
            </div>
            <button class="btn btn-refresh" id="btnRefresh" title="随机打乱卡片顺序">
                🎲 刷新排序
            </button>
            <button class="btn btn-filter" id="btnFavFilter" title="只看收藏">
                ❤ 我的收藏 <span id="favCountBadge" class="badge" style="display:none;">0</span>
            </button>
        </div>

        <div class="stats" id="statsBar">
            共 <span id="totalCount">0</span> 个酒馆实例 · 已收藏 <span id="favCount">0</span> 个
        </div>

        <div class="cards-grid" id="cardsGrid"></div>

        <div class="empty-state" id="emptyState" style="display:none;">
            <span class="empty-icon">🕸️</span>
            <p>没有找到匹配的酒馆</p>
            <p style="font-size:0.78rem;opacity:0.5;">试试其他关键词，或清除筛选条件</p>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal" id="modalBox">
            <button class="modal-close" id="modalClose" title="关闭">✕</button>
            <span class="modal-icon" id="modalIcon">🍷</span>
            <h2 class="modal-name" id="modalName"></h2>
            <p class="modal-desc" id="modalDesc"></p>
            <div class="modal-tags" id="modalTags"></div>
            <a class="btn-visit" id="modalVisitLink" href="#" target="_blank" rel="noopener noreferrer">
                🔗 访问酒馆
            </a>
            <div class="modal-actions-row" style="margin-top:16px;">
                <button class="mini-btn fav-btn" id="modalFavBtn" title="收藏/取消收藏">🤍</button>
                <button class="mini-btn" id="modalShareBtn" title="转发分享">📤</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="links.js"></script>

    <script>
        (function() {
            let cardsData = [];
            let currentOrder = [];
            let favorites = new Set();
            let isFavFilterActive = false;
            let searchQuery = '';
            let currentModalCard = null;

            const STORAGE_KEY = 'sillyTavern_favorites_v2';

            const $cardsGrid = document.getElementById('cardsGrid');
            const $emptyState = document.getElementById('emptyState');
            const $searchInput = document.getElementById('searchInput');
            const $btnRefresh = document.getElementById('btnRefresh');
            const $btnFavFilter = document.getElementById('btnFavFilter');
            const $favCountBadge = document.getElementById('favCountBadge');
            const $totalCount = document.getElementById('totalCount');
            const $favCount = document.getElementById('favCount');
            const $statsBar = document.getElementById('statsBar');
            const $modalOverlay = document.getElementById('modalOverlay');
            const $modalClose = document.getElementById('modalClose');
            const $modalIcon = document.getElementById('modalIcon');
            const $modalName = document.getElementById('modalName');
            const $modalDesc = document.getElementById('modalDesc');
            const $modalTags = document.getElementById('modalTags');
            const $modalVisitLink = document.getElementById('modalVisitLink');
            const $modalFavBtn = document.getElementById('modalFavBtn');
            const $modalShareBtn = document.getElementById('modalShareBtn');
            const $toastContainer = document.getElementById('toastContainer');

            function init() {
                if (window.linksData && Array.isArray(window.linksData)) {
                    cardsData = window.linksData.map((item, index) => ({
                        ...item,
                        id: index,
                        name: item.name || '未命名',
                        description: item.description || '',
                        tags: item.tags || [],
                        url: item.url || '#',
                        icon: item.icon || '🍷',
                    }));
                } else {
                    cardsData = [];
                }
                loadFavorites();
                currentOrder = [...cardsData];

                const urlParams = new URLSearchParams(window.location.search);
                const targetCardName = urlParams.get('card');
                let highlightTarget = null;
                if (targetCardName) {
                    const decodedName = decodeURIComponent(targetCardName);
                    highlightTarget = cardsData.find(c => c.name === decodedName);
                }

                renderCards(highlightTarget);

                if (highlightTarget) {
                    setTimeout(() => {
                        openModal(highlightTarget);
                        const cardEl = document.querySelector(`.card[data-card-name="${CSS.escape(highlightTarget.name)}"]`);
                        if (cardEl) cardEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 400);
                }
                bindEvents();
            }

            const CSS = { escape: (s) => s.replace(/[!"#$%&'()*+,.\/:;<=>?@[\\\]^`{|}~]/g, '\\$&') };

            function loadFavorites() {
                try {
                    const stored = localStorage.getItem(STORAGE_KEY);
                    if (stored) {
                        const arr = JSON.parse(stored);
                        if (Array.isArray(arr)) favorites = new Set(arr);
                    }
                } catch (e) {
                    favorites = new Set();
                }
            }

            function saveFavorites() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify([...favorites]));
                } catch (e) {
                    showToast('⚠️ 收藏存储失败');
                }
            }

            function toggleFavorite(cardName) {
                if (favorites.has(cardName)) {
                    favorites.delete(cardName);
                    showToast('💔 已取消收藏');
                } else {
                    favorites.add(cardName);
                    showToast('❤️ 已添加收藏');
                }
                saveFavorites();
                updateFavUI();
                renderCards();
            }

            function isFavorited(cardName) { return favorites.has(cardName); }

            function updateFavUI() {
                const count = favorites.size;
                $favCount.textContent = count;
                $favCountBadge.textContent = count;
                $favCountBadge.style.display = count > 0 ? 'inline-block' : 'none';
                if (isFavFilterActive) {
                    $btnFavFilter.classList.add('active');
                } else {
                    $btnFavFilter.classList.remove('active');
                }
                if (currentModalCard) updateModalFavBtn(currentModalCard.name);
            }

            function updateModalFavBtn(cardName) {
                if (isFavorited(cardName)) {
                    $modalFavBtn.textContent = '❤';
                    $modalFavBtn.classList.add('favorited');
                } else {
                    $modalFavBtn.textContent = '🤍';
                    $modalFavBtn.classList.remove('favorited');
                }
            }

            function renderCards(highlightTarget = null) {
                let displayList = [...currentOrder];
                if (isFavFilterActive) displayList = displayList.filter(c => favorites.has(c.name));
                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    displayList = displayList.filter(c =>
                        c.name.toLowerCase().includes(q) ||
                        c.description.toLowerCase().includes(q) ||
                        c.tags.some(t => t.toLowerCase().includes(q))
                    );
                }
                $totalCount.textContent = cardsData.length;
                $favCount.textContent = favorites.size;
                updateFavUI();

                if (displayList.length === 0) {
                    $cardsGrid.innerHTML = '';
                    $emptyState.style.display = 'block';
                } else {
                    $emptyState.style.display = 'none';
                    $cardsGrid.innerHTML = displayList.map((card, idx) => {
                        const fav = isFavorited(card.name);
                        const isHL = highlightTarget && card.name === highlightTarget.name;
                        return `
                            <div class="card${fav ? ' favorited' : ''}${isHL ? ' highlight' : ''}"
                                 data-card-name="${escapeHTML(card.name)}"
                                 data-card-index="${card.id}"
                                 style="animation-delay:${idx * 0.04}s;">
                                <div class="card-icon">${escapeHTML(card.icon)}</div>
                                <div class="card-name">${escapeHTML(card.name)}</div>
                                <div class="card-desc">${escapeHTML(card.description)}</div>
                                <div class="card-tags">${card.tags.map(t => `<span class="tag">${escapeHTML(t)}</span>`).join('')}</div>
                                <div class="card-actions">
                                    <button class="mini-btn fav-btn${fav ? ' favorited' : ''}" data-action="fav" data-card-name="${escapeHTML(card.name)}">${fav ? '❤' : '🤍'}</button>
                                    <button class="mini-btn" data-action="share" data-card-name="${escapeHTML(card.name)}">📤</button>
                                </div>
                            </div>`;
                    }).join('');
                }
                bindCardEvents();
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function bindEvents() {
                $searchInput.addEventListener('input', debounce(function() {
                    searchQuery = this.value;
                    renderCards();
                }, 250));
                $btnRefresh.addEventListener('click', () => {
                    shuffleOrder();
                    renderCards();
                    showToast('🎲 卡片已随机排序');
                });
                $btnFavFilter.addEventListener('click', () => {
                    isFavFilterActive = !isFavFilterActive;
                    updateFavUI();
                    renderCards();
                    showToast(isFavFilterActive ? '❤ 仅显示收藏' : '📋 显示全部酒馆');
                });
                $modalClose.addEventListener('click', closeModal);
                $modalOverlay.addEventListener('click', e => {
                    if (e.target === $modalOverlay) closeModal();
                });
                document.addEventListener('keydown', e => {
                    if (e.key === 'Escape' && $modalOverlay.style.display === 'flex') closeModal();
                });
                $modalFavBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    if (currentModalCard) {
                        toggleFavorite(currentModalCard.name);
                        updateModalFavBtn(currentModalCard.name);
                        renderCards();
                    }
                });
                $modalShareBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    if (currentModalCard) shareCard(currentModalCard);
                });
                $modalVisitLink.addEventListener('click', e => {
                    if (!currentModalCard || !currentModalCard.url || currentModalCard.url === '#') {
                        e.preventDefault();
                        showToast('⚠️ 该酒馆暂无有效链接');
                    }
                });
            }

            function bindCardEvents() {
                $cardsGrid.removeEventListener('click', handleCardGridClick);
                $cardsGrid.addEventListener('click', handleCardGridClick);
            }

            function handleCardGridClick(e) {
                const cardEl = e.target.closest('.card');
                if (!cardEl) return;
                const actionBtn = e.target.closest('[data-action]');
                if (actionBtn) {
                    const action = actionBtn.getAttribute('data-action');
                    const cardName = actionBtn.getAttribute('data-card-name');
                    const card = cardsData.find(c => c.name === cardName);
                    if (!card) return;
                    if (action === 'fav') {
                        e.stopPropagation();
                        toggleFavorite(card.name);
                        renderCards();
                    } else if (action === 'share') {
                        e.stopPropagation();
                        shareCard(card);
                    }
                    return;
                }
                const cardName = cardEl.getAttribute('data-card-name');
                const card = cardsData.find(c => c.name === cardName);
                if (card) openModal(card);
            }

            function openModal(card) {
                currentModalCard = card;
                $modalIcon.textContent = card.icon;
                $modalName.textContent = card.name;
                $modalDesc.textContent = card.description;
                $modalTags.innerHTML = card.tags.map(t => `<span class="tag">${escapeHTML(t)}</span>`).join('');
                $modalVisitLink.href = card.url || '#';
                if (!card.url || card.url === '#') {
                    $modalVisitLink.style.opacity = '0.5';
                    $modalVisitLink.style.pointerEvents = 'none';
                } else {
                    $modalVisitLink.style.opacity = '1';
                    $modalVisitLink.style.pointerEvents = 'auto';
                }
                updateModalFavBtn(card.name);
                $modalOverlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
                const url = new URL(window.location);
                url.searchParams.set('card', card.name);
                window.history.replaceState({}, '', url);
            }

            function closeModal() {
                $modalOverlay.style.display = 'none';
                document.body.style.overflow = '';
                currentModalCard = null;
                const url = new URL(window.location);
                url.searchParams.delete('card');
                window.history.replaceState({}, '', url);
                document.querySelectorAll('.card.highlight').forEach(el => el.classList.remove('highlight'));
            }

            function shareCard(card) {
                const url = new URL(window.location);
                url.searchParams.set('card', card.name);
                const shareURL = url.toString();
                const shareText = `🍷【${card.name}】SillyTavern公益酒馆合集 → ${shareURL}`;
                if (navigator.share) {
                    navigator.share({
                        title: `🍷 ${card.name} - SillyTavern酒馆合集`,
                        text: `🍷【${card.name}】推荐给你！`,
                        url: shareURL,
                    }).catch(() => {});
                } else {
                    copyToClipboard(shareText);
                    showToast('📋 分享链接已复制！（含卡片名称）');
                }
            }

            function copyToClipboard(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
                } else fallbackCopy(text);
            }

            function fallbackCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.focus();
                ta.select();
                try { document.execCommand('copy'); } catch (e) {}
                document.body.removeChild(ta);
            }

            function shuffleOrder() {
                const arr = [...currentOrder];
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                currentOrder = arr;
            }

            function showToast(msg) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = msg;
                $toastContainer.appendChild(toast);
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, 2400);
            }

            function debounce(fn, d) {
                let t;
                return function(...a) { clearTimeout(t);
                    t = setTimeout(() => fn.apply(this, a), d); };
            }

            init();
            console.log('🍷 SillyTavern 公益酒馆合集已就绪');
        })();
    </script>
</body>
</html>
