<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ASCII 字符画 | 图灵魔法</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --text: #e8edf2;
      --text2: #9aa0b4;
      --accent: #8b7cf7;
      --accent2: #f97ba8;
      --border: #2a2e3b;
      --radius: 14px;
      --btn-bg: #232738;
      --input-bg: #1e2130;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 1000px; width: 100%;
      background: var(--card); border-radius: 20px;
      padding: 28px 24px; box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }
    h2 { font-size: 1.6rem; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .subtitle { color: var(--text2); font-size: 0.85rem; margin-bottom: 24px; }

    .upload-box {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 30px 20px; text-align: center; cursor: pointer;
      transition: 0.2s; margin-bottom: 20px; background: var(--input-bg);
    }
    .upload-box:hover { border-color: var(--accent); }
    .upload-box.dragover { border-color: var(--accent2); background: rgba(139,124,247,0.08); }
    .upload-box.has-file { border-color: var(--accent2); }
    .upload-box .upload-hint {
      color: var(--text2); font-size: 0.95rem;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      flex-wrap: wrap;
    }
    .upload-box .upload-hint img { max-height: 120px; border-radius: 8px; margin-top: 8px; }
    .upload-box input[type="file"] { display: none; }
    .file-name { font-weight: 600; color: var(--accent); word-break: break-all; }

    .controls {
      display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
      margin-bottom: 20px;
    }
    .control-group {
      display: flex; align-items: center; gap: 8px;
    }
    .control-group label { font-size: 0.85rem; color: var(--text2); white-space: nowrap; }
    .control-group input[type="range"] {
      width: 110px; cursor: pointer;
    }
    .control-group input[type="number"] {
      width: 80px; background: var(--input-bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 8px; font-size: 0.85rem; -moz-appearance: textfield;
    }
    .control-group input[type="number"]::-webkit-outer-spin-button,
    .control-group input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    .control-group input[type="color"] {
      width: 32px; height: 32px; border: none; border-radius: 8px;
      cursor: pointer; background: transparent; padding: 2px;
    }
    .control-group input[type="text"] {
      background: var(--input-bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 10px; font-size: 0.85rem; width: 200px;
    }
    .control-group select {
      background: var(--input-bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 10px; font-size: 0.85rem;
    }
    .control-group input[type="checkbox"] {
      accent-color: var(--accent);
    }
    .preset-chars {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .preset-btn {
      background: var(--btn-bg); color: var(--text2);
      border: 1px solid var(--border); padding: 4px 10px;
      border-radius: 20px; font-size: 0.75rem; cursor: pointer;
      transition: 0.2s; white-space: nowrap;
    }
    .preset-btn:hover { border-color: var(--accent); color: var(--accent); }

    .preview-area {
      background: repeating-conic-gradient(#555 0% 25%, #333 0% 50%) 50% / 20px 20px;
      border-radius: var(--radius);
      padding: 12px; overflow: hidden;
      min-height: 120px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    }
    canvas {
      display: block; max-width: 100%; height: auto;
      image-rendering: pixelated;
    }
    .action-buttons {
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .btn {
      background: var(--accent); color: #fff; border: none;
      padding: 12px 24px; border-radius: 30px; font-weight: 600;
      cursor: pointer; font-size: 0.95rem; transition: 0.2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:active { transform: scale(0.97); }
    .btn:hover { filter: brightness(1.1); }
    .btn.secondary { background: var(--btn-bg); color: var(--text); }
    .hint { margin-top: 10px; font-size: 0.8rem; color: var(--text2); text-align: center; }

    @media (max-width: 600px) {
      body { padding: 10px; }
      .container { padding: 20px 16px; }
      h2 { font-size: 1.3rem; }
      .upload-box { padding: 24px 14px; }
      .controls { gap: 8px; }
      .btn { font-size: 0.85rem; padding: 10px 16px; }
      .control-group input[type="text"] { width: 130px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🅰️ ASCII 字符画</h2>
    <p class="subtitle">上传图片 → 自定义字符、颜色、宽度和背景 → 生成复古/彩色字符画</p>

    <div class="upload-box" id="uploadBox">
      <div class="upload-hint" id="uploadHint">
        🖼️ <span>点击或拖放一张图片（任意格式）</span>
      </div>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>输出宽度</label>
        <input type="range" id="widthSlider" min="40" max="300" value="80" step="10">
        <input type="number" id="widthNumber" value="80" min="1" step="1">
      </div>
      <div class="control-group">
        <label>颜色模式</label>
        <select id="colorMode">
          <option value="single">单一颜色</option>
          <option value="image">图片原色</option>
        </select>
      </div>
      <div class="control-group" id="singleColorGroup">
        <label>字符颜色</label>
        <input type="color" id="charColor" value="#00ff00">
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>背景颜色</label>
        <input type="color" id="bgColor" value="#000000">
      </div>
      <div class="control-group">
        <label>
          <input type="checkbox" id="transparentBg"> 透明背景
        </label>
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>自定义字符集</label>
        <input type="text" id="customChars" value="@%#*+=-:. " placeholder="输入字符序列，越暗的像素用越前面的字符">
      </div>
    </div>
    <div class="preset-chars" id="presetChars">
      <button class="preset-btn" data-chars="@%#*+=-:. ">详细</button>
      <button class="preset-btn" data-chars="#*+=-:. ">中等</button>
      <button class="preset-btn" data-chars="+=-:. ">简单</button>
      <button class="preset-btn" data-chars="█▓▒░ ">方块</button>
      <button class="preset-btn" data-chars="👀😎🤖👾 ">表情</button>
    </div>

    <div class="preview-area" id="previewArea">
      <canvas id="asciiCanvas"></canvas>
    </div>

    <div class="action-buttons">
      <button class="btn" id="copyBtn">📋 复制文本</button>
      <button class="btn secondary" id="downloadTxtBtn">💾 下载 TXT</button>
      <button class="btn secondary" id="downloadImgBtn">🖼️ 下载图片</button>
    </div>
    <div class="hint" id="statusHint"></div>
  </div>

  <script>
    (function() {
      document.documentElement.style.colorScheme = 'dark';

      const uploadBox = document.getElementById('uploadBox');
      const fileInput = document.getElementById('fileInput');
      const uploadHint = document.getElementById('uploadHint');
      const canvas = document.getElementById('asciiCanvas');
      const previewArea = document.getElementById('previewArea');
      const widthSlider = document.getElementById('widthSlider');
      const widthNumber = document.getElementById('widthNumber');
      const colorMode = document.getElementById('colorMode');
      const singleColorGroup = document.getElementById('singleColorGroup');
      const charColor = document.getElementById('charColor');
      const bgColor = document.getElementById('bgColor');
      const transparentBg = document.getElementById('transparentBg');
      const customChars = document.getElementById('customChars');
      const presetChars = document.getElementById('presetChars');
      const copyBtn = document.getElementById('copyBtn');
      const downloadTxtBtn = document.getElementById('downloadTxtBtn');
      const downloadImgBtn = document.getElementById('downloadImgBtn');
      const statusHint = document.getElementById('statusHint');

      let originalImage = null;
      let currentAscii = '';
      let currentColors = [];

      // 颜色模式切换
      colorMode.addEventListener('change', () => {
        singleColorGroup.style.display = colorMode.value === 'single' ? 'flex' : 'none';
        generateAscii();
      });

      // 背景控件
      bgColor.addEventListener('input', () => { if (originalImage) drawCanvas(); });
      transparentBg.addEventListener('change', () => { if (originalImage) drawCanvas(); });

      // 宽度双向联动
      function setWidth(val) {
        val = Math.max(1, parseInt(val) || 80);
        widthNumber.value = val;
        // 滑块最大300，如果手动输入超过300，滑块拉到最右
        widthSlider.value = Math.min(val, 300);
        return val;
      }

      widthSlider.addEventListener('input', () => {
        const val = parseInt(widthSlider.value, 10);
        widthNumber.value = val;
        generateAscii();
      });

      widthNumber.addEventListener('input', () => {
        const val = setWidth(widthNumber.value);
        generateAscii();
      });
      widthNumber.addEventListener('blur', () => {
        const val = setWidth(widthNumber.value);
        generateAscii();
      });

      // 上传处理
      uploadBox.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleImage(e.target.files[0]);
      });
      uploadBox.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadBox.classList.add('dragover');
      });
      uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('dragover'));
      uploadBox.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadBox.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleImage(e.dataTransfer.files[0]);
      });

      function handleImage(file) {
        if (!file.type.startsWith('image/')) {
          alert('请选择一张图片！');
          return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.src = e.target.result;
          img.onload = () => {
            originalImage = img;
            uploadHint.innerHTML = `<img src="${img.src}" style="max-height:120px; border-radius:8px; display:block; margin:0 auto;"><span class="file-name">${file.name}</span>`;
            uploadBox.classList.add('has-file');
            generateAscii();
            statusHint.textContent = '';
          };
        };
        reader.readAsDataURL(file);
      }

      // 生成字符画数据
      function generateAscii() {
        if (!originalImage) return;

        const charSet = customChars.value.trim() || ' ';
        const outputWidth = setWidth(widthNumber.value);
        const aspectRatio = originalImage.height / originalImage.width;
        const charAspect = 2;
        const outputHeight = Math.floor(outputWidth * aspectRatio / charAspect);

        // 采样
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = outputWidth;
        tempCanvas.height = outputHeight;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(originalImage, 0, 0, outputWidth, outputHeight);
        const imageData = tempCtx.getImageData(0, 0, outputWidth, outputHeight);
        const pixels = imageData.data;

        const colors = [];
        let ascii = '';

        for (let y = 0; y < outputHeight; y++) {
          let line = '';
          const rowColors = [];
          for (let x = 0; x < outputWidth; x++) {
            const index = (y * outputWidth + x) * 4;
            const r = pixels[index];
            const g = pixels[index + 1];
            const b = pixels[index + 2];
            const a = pixels[index + 3];
            const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
            const charIndex = Math.floor(brightness / 255 * (charSet.length - 1));
            const ch = charSet[charIndex] || charSet[0];
            line += ch;
            rowColors.push([r, g, b, a]);
          }
          ascii += line + '\n';
          colors.push(rowColors);
        }

        currentAscii = ascii;
        currentColors = colors;
        drawCanvas(outputWidth, outputHeight);
      }

      // 绘制Canvas
      function drawCanvas(cols, rows) {
        if (!originalImage) return;
        cols = cols || parseInt(widthNumber.value, 10);
        const aspectRatio = originalImage.height / originalImage.width;
        const charAspect = 2;
        rows = rows || Math.floor(cols * aspectRatio / charAspect);

        const containerWidth = previewArea.clientWidth - 24;
        if (containerWidth <= 0 || cols === 0) return;

        const targetFontSize = Math.floor(containerWidth / cols / 0.6);
        const fontSize = Math.min(24, Math.max(4, targetFontSize));
        const lineHeight = fontSize * 1.2;

        canvas.width = containerWidth;
        canvas.height = lineHeight * rows;
        canvas.style.width = containerWidth + 'px';
        canvas.style.height = (lineHeight * rows) + 'px';

        const ctx = canvas.getContext('2d');
        if (transparentBg.checked) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        } else {
          ctx.fillStyle = bgColor.value;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        ctx.font = `${fontSize}px 'Courier New', monospace`;
        ctx.textBaseline = 'top';

        const isSingleColor = colorMode.value === 'single';
        const singleColor = charColor.value;

        for (let y = 0; y < rows; y++) {
          if (!currentColors[y]) continue;
          for (let x = 0; x < cols; x++) {
            const ch = (currentAscii.split('\n')[y] || '')[x] || ' ';
            if (isSingleColor) {
              ctx.fillStyle = singleColor;
            } else {
              const [r, g, b, a = 255] = currentColors[y][x] || [0,255,0,255];
              ctx.fillStyle = `rgba(${r},${g},${b},${a/255})`;
            }
            ctx.fillText(ch, x * fontSize * 0.6, y * lineHeight);
          }
        }
      }

      // 其他控件
      charColor.addEventListener('input', () => {
        if (colorMode.value === 'single' && originalImage) drawCanvas();
      });
      customChars.addEventListener('input', generateAscii);

      presetChars.addEventListener('click', (e) => {
        const btn = e.target.closest('.preset-btn');
        if (!btn) return;
        customChars.value = btn.dataset.chars;
        generateAscii();
      });

      window.addEventListener('resize', () => {
        if (originalImage) {
          const cols = parseInt(widthNumber.value, 10);
          const aspectRatio = originalImage.height / originalImage.width;
          const charAspect = 2;
          const rows = Math.floor(cols * aspectRatio / charAspect);
          drawCanvas(cols, rows);
        }
      });

      // 复制/下载
      copyBtn.addEventListener('click', async () => {
        if (!currentAscii) return;
        try {
          await navigator.clipboard.writeText(currentAscii);
          statusHint.textContent = '✅ 已复制到剪贴板！';
        } catch (err) {
          statusHint.textContent = '❌ 复制失败，请手动复制。';
        }
      });

      downloadTxtBtn.addEventListener('click', () => {
        if (!currentAscii) return;
        const blob = new Blob([currentAscii], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'ascii_art.txt';
        a.click();
        URL.revokeObjectURL(url);
        statusHint.textContent = '✅ TXT 已下载。';
      });

      downloadImgBtn.addEventListener('click', () => {
        if (!originalImage) return;
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'ascii_art.png';
          a.click();
          URL.revokeObjectURL(url);
          statusHint.textContent = '✅ 图片已下载。';
        });
      });

      // 初始化
      statusHint.textContent = '';
      singleColorGroup.style.display = 'flex';
      widthNumber.value = 80;
    })();
  </script>
</body>
</html>
