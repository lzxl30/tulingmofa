<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>趣网站 | 有趣网站导航</title>
  <style>
    :root {
      --bg: #0f1117;
      --card-bg: #1a1d27;
      --text: #e8edf2;
      --text-secondary: #9aa0b4;
      --primary: #8b7cf7;
      --primary-light: #b4a7ff;
      --accent-1: #f97ba8;
      --accent-2: #2dd4bf;
      --accent-3: #f6c85b;
      --accent-4: #5ba0f5;
      --accent-5: #f07b6c;
      --accent-6: #22d3ee;
      --border: #2a2e3b;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      --shadow-hover: 0 16px 40px rgba(0, 0, 0, 0.7);
      --radius: 18px;
      --radius-sm: 12px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --tag-bg: #232738;
      --tag-active-bg: var(--primary);
      --tag-text: #b4bcd0;
      --footer-bg: #12141c;
      --input-bg: #1e2130;
      --card-border: transparent;
    }

    body.light-mode {
      --bg: #f4f5fa;
      --card-bg: #ffffff;
      --text: #1e1e2f;
      --text-secondary: #5b5e72;
      --primary: #6c5ce7;
      --primary-light: #a29bfe;
      --accent-1: #e84393;
      --accent-2: #00b894;
      --accent-3: #f39c12;
      --accent-4: #0984e3;
      --accent-5: #d63031;
      --accent-6: #00a8ff;
      --border: #e0e3eb;
      --shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
      --shadow-hover: 0 14px 34px rgba(0, 0, 0, 0.1);
      --tag-bg: #ebeef5;
      --tag-active-bg: #6c5ce7;
      --tag-text: #4a4d5e;
      --footer-bg: #f0f1f6;
      --input-bg: #f0f2f8;
      --card-border: #e8ecf5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      background-image:
        radial-gradient(ellipse at 30% 10%, rgba(139, 124, 247, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 90%, rgba(45, 212, 191, 0.05) 0%, transparent 60%);
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 100px;
    }

    /* 头部、卡片、底部等样式保持不变，略去中间相同部分以节省篇幅，完整代码会全部给出 */

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 0; opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s; }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-content { background: var(--card-bg); border-radius: 0; width: 100%; height: 100%; max-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.6); position: relative; }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-bottom: 1px solid var(--border);
      gap: 8px; flex-wrap: wrap; background: var(--card-bg);
    }
    .modal-title-text { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    .modal-toolbar { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .tool-btn {
      background: transparent; border: 1px solid rgba(255,255,255,0.15);
      color: var(--text-secondary); font-size: 1rem;
      width: 32px; height: 32px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tool-btn:active { background: rgba(255,255,255,0.1); }
    .modal-close-btn {
      background: var(--primary); border: none;
      color: #fff; font-size: 0.8rem; font-weight: 600;
      padding: 6px 12px; border-radius: 20px; cursor: pointer;
      transition: 0.2s; white-space: nowrap;
    }
    .modal-close-btn:hover { background: var(--primary-light); }

    .zoom-btns { display: flex; align-items: center; gap: 2px; background: rgba(255,255,255,0.06); border-radius: 20px; padding: 2px 4px; }
    .zoom-btn { width: 28px; height: 28px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text); font-size: 1rem; font-weight: 600; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
    .zoom-btn:active { background: rgba(255,255,255,0.15); }
    .zoom-value { font-size: 0.75rem; color: var(--text-secondary); min-width: 32px; text-align: center; }

    .modal-iframe-wrap { flex: 1; position: relative; background: #000; overflow: auto; -webkit-overflow-scrolling: touch; display: flex; align-items: flex-start; justify-content: flex-start; }
    .iframe-scaler { transform-origin: top left; transition: transform 0.2s ease, width 0.2s, height 0.2s; flex-shrink: 0; }
    .iframe-scaler iframe { width: 100%; height: 100%; border: none; display: block; }
    .modal-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #666; font-size: 0.9rem; z-index: 2; }

    /* 横屏模式 */
    .modal-content.landscape .modal-header { display: none; }
    .modal-content.landscape .modal-iframe-wrap {
      position: fixed;
      top: 0; left: 0;
      width: 100vh; height: 100vw;
      transform: rotate(90deg) translateY(-100%);
      transform-origin: top left;
      overflow: auto;
      z-index: 5;
    }
    .modal-content.landscape .iframe-scaler {
      transform-origin: top left;
    }

    /* 横屏浮动工具栏：右上角，向左展开，内部元素旋转90度 */
    .landscape-float-toolbar {
      display: none;
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1010;
      flex-direction: row-reverse;   /* 从右向左排列 */
      align-items: center;
      gap: 6px;
    }
    .modal-content.landscape .landscape-float-toolbar { display: flex; }

    .float-tool-btn {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
      -webkit-tap-highlight-color: transparent;
      transform: rotate(90deg);   /* 横屏视角正向 */
    }
    .float-tool-btn:active { background: rgba(255,255,255,0.15); }

    .landscape-toggle-btn {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      color: #fff;
      font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      transform: rotate(90deg);
    }

    .landscape-expand-btns {
      display: flex;
      flex-direction: row-reverse;  /* 向左展开 */
      align-items: center;
      gap: 6px;
      overflow: hidden;
      max-width: 0;
      opacity: 0;
      transition: max-width 0.3s ease, opacity 0.2s;
      white-space: nowrap;
    }
    .landscape-expand-btns.open {
      max-width: 200px;  /* 足够宽以显示按钮和数字 */
      opacity: 1;
    }
    .float-zoom-value {
      color: #fff;
      font-size: 0.7rem;
      text-align: center;
      min-width: 30px;
      transform: rotate(90deg);
    }

    /* 移动端调整 */
    @media (max-width: 600px) {
      .modal-header { padding: 6px 10px; }
      .modal-close-btn { padding: 5px 10px; font-size: 0.75rem; }
    }

    /* 省略其他已有样式，完整代码会包含全部 */
  </style>
</head>
<body>
  <!-- 头部、内容区等结构完全不变 -->
  <header class="header">...</header>
  <div class="main-container">...</div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title-text" id="modalTitle">网站加载中...</span>
        <div class="modal-toolbar">
          <div class="zoom-btns">
            <button class="zoom-btn" id="zoomOutBtn" title="缩小">−</button>
            <span class="zoom-value" id="zoomValue">100%</span>
            <button class="zoom-btn" id="zoomInBtn" title="放大">+</button>
          </div>
          <button class="tool-btn" id="rotateBtnHeader" title="横屏模式">↔️</button>
          <button class="modal-close-btn" id="modalClose">← 返回</button>
        </div>
      </div>
      <div class="modal-iframe-wrap" id="iframeWrap">
        <div class="iframe-scaler" id="iframeScaler" style="width:100%; height:100%;">
          <iframe id="modalIframe" src=""></iframe>
        </div>
        <div class="modal-loading" id="modalLoading">⏳ 加载中...</div>
      </div>

      <!-- 横屏浮动工具栏 -->
      <div class="landscape-float-toolbar" id="landscapeFloatToolbar">
        <div class="landscape-toggle-btn" id="floatToggleBtn">◁</div>
        <div class="landscape-expand-btns" id="floatExpandBtns">
          <button class="float-tool-btn" id="floatZoomOutBtn" title="缩小">−</button>
          <span class="float-zoom-value" id="floatZoomValue">100%</span>
          <button class="float-tool-btn" id="floatZoomInBtn" title="放大">+</button>
          <button class="float-tool-btn" id="floatRotateBackBtn" title="恢复竖屏">↺</button>
        </div>
      </div>
    </div>
  </div>

  <div class="fixed-bottom-bar">...</div>

  <script>
    // 所有原有逻辑，只修改横屏按钮交互部分
    (function() {
      // ... 初始化代码 ...

      // 横屏相关变量
      let landscapeFloatToolbar, floatToggleBtn, floatExpandBtns;
      let floatZoomInBtn, floatZoomOutBtn, floatZoomValueEl, floatRotateBackBtn;

      // 拖拽标志
      let isDraggingFloat = false;
      let startX, startY, startLeft, startTop;

      function initFramework() {
        // ... 原有变量获取 ...
        landscapeFloatToolbar = document.getElementById('landscapeFloatToolbar');
        floatToggleBtn = document.getElementById('floatToggleBtn');
        floatExpandBtns = document.getElementById('floatExpandBtns');
        floatZoomInBtn = document.getElementById('floatZoomInBtn');
        floatZoomOutBtn = document.getElementById('floatZoomOutBtn');
        floatZoomValueEl = document.getElementById('floatZoomValue');
        floatRotateBackBtn = document.getElementById('floatRotateBackBtn');

        // 展开/折叠函数
        function toggleFloatExpand() {
          floatExpandBtns.classList.toggle('open');
          floatToggleBtn.textContent = floatExpandBtns.classList.contains('open') ? '▷' : '◁';
        }

        // 只监听触摸事件实现点击与拖动
        floatToggleBtn.addEventListener('touchstart', function(e) {
          isDraggingFloat = false;
          const touch = e.touches[0];
          startX = touch.clientX;
          startY = touch.clientY;
          const rect = landscapeFloatToolbar.getBoundingClientRect();
          startLeft = rect.left;
          startTop = rect.top;
          landscapeFloatToolbar.style.transition = 'none';
        });

        floatToggleBtn.addEventListener('touchmove', function(e) {
          const touch = e.touches[0];
          const dx = touch.clientX - startX;
          const dy = touch.clientY - startY;
          if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
            isDraggingFloat = true;
          }
          if (isDraggingFloat) {
            e.preventDefault();
            const newLeft = Math.min(window.innerWidth - 50, Math.max(0, startLeft + dx));
            const newTop = Math.min(window.innerHeight - 50, Math.max(0, startTop + dy));
            landscapeFloatToolbar.style.left = newLeft + 'px';
            landscapeFloatToolbar.style.top = newTop + 'px';
            landscapeFloatToolbar.style.right = 'auto';
            landscapeFloatToolbar.style.bottom = 'auto';
          }
        });

        floatToggleBtn.addEventListener('touchend', function(e) {
          landscapeFloatToolbar.style.transition = '0.2s';
          if (!isDraggingFloat) {
            toggleFloatExpand(); // 没有拖动视为点击
          }
          isDraggingFloat = false;
        });

        // 恢复竖屏
        floatRotateBackBtn.addEventListener('click', () => {
          const modalContent = document.querySelector('.modal-content');
          modalContent.classList.remove('landscape');
          floatExpandBtns.classList.remove('open');
          floatToggleBtn.textContent = '◁';
        });

        // 顶部旋转按钮
        document.getElementById('rotateBtnHeader').addEventListener('click', () => {
          const modalContent = document.querySelector('.modal-content');
          modalContent.classList.add('landscape');
          floatExpandBtns.classList.remove('open');
          floatToggleBtn.textContent = '◁';
        });

        // 缩放同步（顶部和浮动按钮）
        function applyZoom(zoom) {
          currentZoom = Math.min(2, Math.max(0.25, zoom));
          iframeScaler.style.transform = `scale(${currentZoom})`;
          iframeScaler.style.width = (100 / currentZoom) + '%';
          iframeScaler.style.height = (100 / currentZoom) + '%';
          const percent = Math.round(currentZoom * 100) + '%';
          zoomValueEl.textContent = percent;
          if (floatZoomValueEl) floatZoomValueEl.textContent = percent;
        }

        // 为浮动缩放按钮绑定事件
        floatZoomInBtn.addEventListener('click', () => applyZoom(currentZoom + 0.1));
        floatZoomOutBtn.addEventListener('click', () => applyZoom(currentZoom - 0.1));
      }

      // 其余工具函数保持不变 ...
    })();
  </script>
</body>
</html>
